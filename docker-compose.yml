version: '3.7'
services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: explorecalifornia
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.explorecalifornia-local.rule=Host(`explorecalifornia.binary`)"
      - "traefik.http.routers.explorecalifornia-local.entrypoints=web"
      - "traefik.http.routers.explorecalifornia-public.rule=Host(`explorecalifornia.kancodes.de`)"
      - "traefik.http.routers.explorecalifornia-public.entrypoints=web"
      - "traefik.http.services.explorecalifornia.loadbalancer.server.port=80"

  # Exposes nginx metrics to your existing homelab Prometheus by scraping
  # the website's internal /stub_status endpoint. Shares the external `proxy`
  # network so Prometheus can reach it at explorecalifornia-nginx-exporter:9113.
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: explorecalifornia-nginx-exporter
    restart: unless-stopped
    command:
      - "--nginx.scrape-uri=http://website:80/stub_status"
    depends_on:
      - website
    networks:
      - proxy

networks:
  proxy:
    external: true
