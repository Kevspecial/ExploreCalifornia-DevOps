version: '3.7'
services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: explorecalifornia
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.explorecalifornia-local.rule=Host(`explorecalifornia.binary`)"
      - "traefik.http.routers.explorecalifornia-local.entrypoints=web"
      - "traefik.http.routers.explorecalifornia-public.rule=Host(`explorecalifornia.kancodes.de`)"
      - "traefik.http.routers.explorecalifornia-public.entrypoints=web"
      - "traefik.http.services.explorecalifornia.loadbalancer.server.port=80"

  unit-test:
    volumes:
        - $PWD:/app
    build:
      dockerfile: rspec.dockerfile
      context: .
    entrypoint: rspec
    command:
      - /app/spec/unit/*_spec.rb
      - --pattern

networks:
  proxy:
    external: true
