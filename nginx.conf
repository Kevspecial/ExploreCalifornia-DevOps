events {
  worker_connections  1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  # Don't leak the nginx version in headers / error pages
  server_tokens off;

  # Static-asset caching is disabled here so content updates show up immediately.
  add_header Cache-Control "max-age=0,no-cache,no-store,must-revalidate";

  # Security headers
  add_header X-Frame-Options            "SAMEORIGIN"        always;
  add_header X-Content-Type-Options     "nosniff"           always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'" always;

  server {
    listen      80;
    server_name localhost;
    root        /website;
    index       index.htm;

    location / {
      try_files $uri $uri/ =404;
    }

    # nginx metrics endpoint for the Prometheus exporter.
    # Only reachable from inside the Docker network / localhost.
    location /stub_status {
      stub_status;
      access_log off;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      allow 10.0.0.0/8;
      deny  all;
    }
  }
}
